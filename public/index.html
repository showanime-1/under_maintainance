<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            color: white;
            background-color: black;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 20px;
            display: inline-block;
        }

        .logo-container {
            margin-bottom: 20px;
            background: none;
        }

        .message h1 {
            font-size: 2.5rem;
            margin: 0;
        }

        .message p {
            font-size: 1.2rem;
            margin: 10px 0 0;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="https://showanime-mdn.pages.dev/image/logo-transparent.png" alt="ShowAnime Logo" class="logo"> <!-- Replace with your logo path -->
        </div>
        <div class="message">
            <h1>We'll be back soon!</h1>
            <p>Our website is currently under maintenance for the next 12 hours.<br>
            Thank you for your patience and understanding.</p>
        </div>
    </div>
</body>
</html>
